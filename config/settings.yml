google_trends:
  enabled: true
  hl: ja-JP
  tz: 540
  geo: JP
  pn: japan
  use_seed_keywords: true
  seed_keywords_path: config/seed_keywords.yml
  seed_keywords_limit: 80
  use_trending_searches: false
  timeframe:
    daily: now 7-d
    weekly: today 3-m
  trending_limit: 50
  related_limit: 6
  interest_keywords_limit: 40
  interest_batch_size: 5
  include_related_queries: true
  include_interest_time_series: true
  include_top_charts: false
  request_interval_seconds: 1.0
  retries: 2
  backoff_factor: 0.5

preprocess:
  stopwords:
    - とは
    - まとめ
    - 最新
    - 方法
    - やり方
    - おすすめ
    - ランキング
    - 速報
    - 公式
    - 今日
    - 明日
    - 昨日

classification:
  llm:
    enabled: false
    provider: openai
    model: ""
    min_confidence: 0.65
  fallback:
    enabled: true

audience:
  enabled: true
  config_path: config/audience.yml

generation:
  enabled: true
  config_path: config/generation.yml

pipeline:
  period: daily
  sample_when_empty: true
  input_csv: ""
  output_dir: outputs

output:
  top_n: 30
  classified_keywords_csv: classified_keywords.csv
  theme_ranking_csv: theme_ranking.csv
  theme_timeseries_csv: theme_timeseries.csv
  audience_breakdown_csv: audience_breakdown.csv
  generation_breakdown_csv: generation_breakdown.csv
  ranking_chart: theme_ranking.png
  timeseries_chart: theme_timeseries.png
